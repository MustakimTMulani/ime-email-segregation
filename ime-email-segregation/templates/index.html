<!DOCTYPE html>
<html>

<head>

    <title>IME Email Segregation System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg">

        <div class="card-body p-5">

            <h1 class="text-center text-primary mb-3">
                IME Email Segregation System
            </h1>

            <p class="text-center text-muted mb-4">
                Automated Classification, Extraction and Recommendation System
            </p>

            <form action="/upload" method="POST" enctype="multipart/form-data">

                <div class="mb-4">

                    <label class="form-label fw-bold">
                        Upload Email File
                    </label>

                    <input
                        type="file"
                        name="email_file"
                        class="form-control"
                        required>

                </div>

                <div class="d-grid mb-4">

                    <button
                        type="submit"
                        class="btn btn-primary btn-lg">

                        Process Email

                    </button>

                </div>

            </form>

            <hr>

            <h4 class="text-center mb-4">
                Quick Actions
            </h4>

            <div class="row g-3">

                <div class="col-md-4">

                    <a
                        href="/dashboard"
                        class="btn btn-success w-100 py-3">

                        Dashboard

                    </a>

                </div>

                <div class="col-md-4">

                    <a
                        href="/records"
                        class="btn btn-info w-100 py-3 text-white">

                        View Records

                    </a>

                </div>

                <div class="col-md-4">

                    <a
                        href="/recommendations"
                        class="btn btn-secondary w-100 py-3">

                        Recommendations

                    </a>

                </div>

                <div class="col-md-12">

                    <a
                        href="/matches"
                        class="btn btn-warning w-100 py-3">

                        Matches

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
