<!DOCTYPE html>
<html>
<head>

    <title>IME Email Segregation System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h1 class="text-center mb-4">
                IME Email Segregation System
            </h1>

            <form action="/upload" method="POST" enctype="multipart/form-data">

                <div class="mb-3">

                    <label class="form-label">
                        Upload Email File
                    </label>

                    <input
                        type="file"
                        name="email_file"
                        class="form-control"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary">

                    Process Email

                </button>

            </form>

            <hr>

            <a href="/dashboard" class="btn btn-success">
                Dashboard
            </a>

            <a href="/records" class="btn btn-secondary">
                Records
            </a>

            <a href="/matches" class="btn btn-warning">
                Matches
            </a>

        </div>

    </div>

</div>

</body>
</html>
