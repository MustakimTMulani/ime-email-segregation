<!DOCTYPE html>
<html>

<head>

    <title>Record Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
        }

        .detail-card{
            border:none;
            border-radius:15px;
        }

        .header-card{
            border:none;
            border-radius:15px;
        }

        .field-name{
            font-weight:600;
            color:#2c3e50;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <div class="card header-card shadow-sm mb-4">

        <div class="card-body">

            <h1>
                Extraction Details
            </h1>

            <p class="text-muted mb-0">

                Complete extracted information for this record

            </p>

        </div>

    </div>

    <div class="card detail-card shadow-sm">

        <div class="card-body">

            <h4 class="mb-3">

                Category:
                {{ record.category }}

            </h4>

            <table class="table table-bordered table-striped">

                <thead class="table-primary">

                    <tr>

                        <th width="35%">
                            Field
                        </th>

                        <th>
                            Value
                        </th>

                    </tr>

                </thead>

                <tbody>

                    {% for key, value in extraction_data.items() %}

                    <tr>

                        <td class="field-name">

                            {{ key.replace("_", " ").title() }}

                        </td>

                        <td>

                            {{ value or "-" }}

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

    <div class="mt-4">

        <a
            href="/records"
            class="btn btn-primary">

            Back to Records

        </a>

        <a
            href="/dashboard"
            class="btn btn-success">

            Dashboard

        </a>

        <a
            href="/"
            class="btn btn-secondary">

            Home

        </a>

    </div>

</div>

</body>

</html>
