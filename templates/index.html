<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IME Email Segregation System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
        }

        .hero-card{
            border:none;
            border-radius:18px;
            overflow:hidden;
        }

        .hero-header{
            background:linear-gradient(135deg,#0d6efd,#4f8cff);
            color:white;
            padding:40px;
        }

        .feature-card{
            border:none;
            border-radius:15px;
            transition:.25s;
            height:100%;
        }

        .feature-card:hover{
            transform:translateY(-4px);
            box-shadow:0 8px 20px rgba(0,0,0,0.1);
        }

        .icon-box{
            width:60px;
            height:60px;
            border-radius:12px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:28px;
            margin:auto;
            margin-bottom:15px;
            background:#eef4ff;
        }

        .upload-box{
            background:white;
            border-radius:15px;
            padding:25px;
        }

        .quick-title{
            color:#6c757d;
            font-size:14px;
            letter-spacing:1px;
            text-transform:uppercase;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <div class="card shadow hero-card">

        <div class="hero-header">

            <div class="d-flex justify-content-between align-items-center">

                <div>

                    <h1 class="mb-2">
                        IME Email Segregation System
                    </h1>

                    <p class="mb-0">
                        Automated Classification, Extraction and Recommendation System
                    </p>

                </div>

                <a
                    href="/api-test"
                    class="btn btn-light">

                    API Endpoint

                </a>

            </div>

        </div>

        <div class="card-body p-4">

            <div class="upload-box shadow-sm mb-4">

                <h5 class="mb-3">
                    Upload Email File
                </h5>

                <form action="/upload" method="POST" enctype="multipart/form-data">

                    <div class="mb-3">

                        <input
                            type="file"
                            name="email_file"
                            class="form-control"
                            required>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary">

                        Process Email

                    </button>

                </form>

            </div>

            <div class="mb-3">

                <div class="quick-title">
                    Quick Actions
                </div>

            </div>

            <div class="row g-4">

                <div class="col-md-3">

                    <a href="/dashboard"
                       class="text-decoration-none text-dark">

                        <div class="card feature-card shadow-sm">

                            <div class="card-body text-center">

                                <div class="icon-box">
                                    📊
                                </div>

                                <h5>
                                    Dashboard
                                </h5>

                                <small class="text-muted">
                                    View analytics and summaries
                                </small>

                            </div>

                        </div>

                    </a>

                </div>

                <div class="col-md-3">

                    <a href="/records"
                       class="text-decoration-none text-dark">

                        <div class="card feature-card shadow-sm">

                            <div class="card-body text-center">

                                <div class="icon-box">
                                    📂
                                </div>

                                <h5>
                                    Records
                                </h5>

                                <small class="text-muted">
                                    Access processed emails
                                </small>

                            </div>

                        </div>

                    </a>

                </div>

                <div class="col-md-3">

                    <a href="/recommendations"
                       class="text-decoration-none text-dark">

                        <div class="card feature-card shadow-sm">

                            <div class="card-body text-center">

                                <div class="icon-box">
                                    💡
                                </div>

                                <h5>
                                    Smart Insights
                                </h5>

                                <small class="text-muted">
                                    View recommendations
                                </small>

                            </div>

                        </div>

                    </a>

                </div>

                <div class="col-md-3">

                    <a href="/matches"
                       class="text-decoration-none text-dark">

                        <div class="card feature-card shadow-sm">

                            <div class="card-body text-center">

                                <div class="icon-box">
                                    🎯
                                </div>

                                <h5>
                                    Matching Engine
                                </h5>

                                <small class="text-muted">
                                    Find relevant matches
                                </small>

                            </div>

                        </div>

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
